<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purrfect Match | Cat Adoption</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Find Your Purrfect Match</h1>
        <p>Adopt a feline friend today!</p>
    </header>

    <main class="gallery-container">
        <div class="cat-card">
            <img src="https://placecats.com/300/200" alt="A fluffy Maine Coon cat">
            <div class="card-content">
                <h3>Maine Coon</h3>
                <p>Gentle giants with social personalities.</p>
                <button class="adopt-btn">Adopt Me</button>
            </div>
        </div>

        <div class="cat-card">
            <img src="https://placecats.com/301/200" alt="A sleek Siamese cat">
            <div class="card-content">
                <h3>Siamese</h3>
                <p>Highly intelligent and very talkative.</p>
                <button class="adopt-btn">Adopt Me</button>
            </div>
        </div>

        <div class="cat-card">
            <img src="https://placecats.com/302/200" alt="A round Scottish Fold cat">
            <div class="card-content">
                <h3>Scottish Fold</h3>
                <p>Known for their adorable folded ears.</p>
                <button class="adopt-btn">Adopt Me</button>
            </div>
        </div>
        
        </main>

</body>
</html>
